name: 공매 데이터 갱신
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 수집 실행
        env:
          DATA_KEY: ${{ secrets.DATA_KEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          REGION_SD: 서울특별시
          REGION_GU: 광진구
        run: python fetch_gonmae.py
      - name: 결과 저장(커밋)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.js geocode_cache.json
          git commit -m "데이터 갱신 $(date +%Y-%m-%d)" || echo "변경 없음"
          git push
